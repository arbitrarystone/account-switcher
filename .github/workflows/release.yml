name: release

# 推 v* tag 触发：多平台矩阵构建（macOS Intel / macOS Apple Silicon / Windows），
# 各自用 updater 私钥签名，合并生成 latest.json 到同一个 GitHub Release，
# app 内「检查更新」按运行架构拉取对应包。
#
# 需在仓库 Settings → Secrets and variables → Actions 配置：
#   TAURI_SIGNING_PRIVATE_KEY          —— `tauri signer generate` 产出的私钥内容
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD —— 私钥密码（生成时未设则不加，引用缺失即空）

on:
  push:
    tags:
      - "v*"

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
            rust_targets: aarch64-apple-darwin
            label: "macOS (Apple Silicon)"
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
            rust_targets: x86_64-apple-darwin
            label: "macOS (Intel)"
          - platform: windows-latest
            args: ""
            rust_targets: ""
            label: "Windows"

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
          key: ${{ matrix.platform }}-${{ matrix.rust_targets }}

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build & publish (tauri-action)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Account Switcher ${{ github.ref_name }}"
          releaseBody: "按平台下载：macOS 分 Intel / Apple Silicon，Windows 为 .exe/.msi。应用内「检查更新」会按架构自动获取此版本。"
          releaseDraft: false
          prerelease: false
          updaterJsonPreferNsis: true
          args: ${{ matrix.args }}
